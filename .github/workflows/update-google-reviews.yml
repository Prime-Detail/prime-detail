name: Update Google Reviews Data

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch reviews from Google Places API
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACES_TEXT_QUERY: ${{ secrets.GOOGLE_PLACES_TEXT_QUERY }}
        run: node tools/fetch-google-reviews.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- astro/src/data/google-reviews.json; then
            echo "No review changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add astro/src/data/google-reviews.json
          git commit -m "chore(data): refresh google reviews"
          git push
